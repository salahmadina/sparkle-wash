<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — SparkleWash</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <nav>
    <ul>
      <li><a href="#home">Home</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#contact">Contact Us</a></li>
      <li><a href="#profile">Profile</a></li>
    </ul>
  </nav>

  <div class="brand">🚗 SparkleWash</div>

  <div class="card">

    <!-- Cover + Avatar -->
    <div class="cover"></div>
    <div class="avatar-wrap"><div class="avatar">👤</div></div>

    <!-- Name & Email -->
    <div class="user-info">
      <h2> Your Name</h2>
    </div>

    <!-- Quick stats -->
    <div class="stats">
      <div class="stat"><strong>12 </strong><span>Bookings</span></div> <br>
     </div>

      <div class="field">
        <label>Full Name</label>
        <input type="text" value="Your Name" />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" value="Name@example.com" />
      </div>
      <div class="field">
        <label>Phone</label>
        <input type="tel" value="+201xxxxxxxxx" />
      </div>
      <div class="field">
        <label>City</label>
        <input type="text" value="Cairo" />
      </div>

        </div>

  </div>

</body>
</html>
